name: Feature request
description: Propose a package, docs, or sample improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        This project mirrors the DX of `@nestjs/swagger` for the event/message side while staying faithful to AsyncAPI 3.0. If the request adds public package API, please explain the repeated application pain and why existing Nest or AsyncAPI primitives are not enough.
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to document, and where does the current package fall short?
    validations:
      required: true
  - type: textarea
    id: current-approach
    attributes:
      label: Current approach
      description: Show how you solve this today with Nest, AsyncAPI tooling, or application code.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest package, docs, or sample change that would help.
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Change type
      options:
        - documentation
        - sample
        - testing utility
        - package API
        - transport binding
        - release or CI
        - other
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This keeps AsyncAPI 3.0 semantics visible and uses spec primitives only, with no non-standard extensions.
          required: true
        - label: This stays documentation-only and does not turn the package into a runtime transport.
          required: true
        - label: This fits normal Nest module, decorator, and metadata-reflection patterns, mirroring `@nestjs/swagger`.
          required: true
